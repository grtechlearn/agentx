name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install pytest pytest-asyncio

      - name: Import checks
        run: |
          python -c "import agentx; print(f'AgentX v{agentx.__version__}')"
          python -c "from agentx.core import BaseAgent, Orchestrator, create_llm"
          python -c "from agentx.config import AgentXConfig"

      - name: Run tests
        run: pytest tests/ -v
