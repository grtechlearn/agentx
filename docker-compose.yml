version: "3.9"

services:
  agentx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentx-daemon
    ports:
      - "8080:8080"
    environment:
      - AGENTX_ENV=production
      - DATABASE_URL=postgresql://agentx:agentx_secret@postgres:5432/agentx
      - REDIS_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - agentx-data:/app/data
      - agentx-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: agentx-postgres
    environment:
      POSTGRES_USER: agentx
      POSTGRES_PASSWORD: agentx_secret
      POSTGRES_DB: agentx
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentx"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agentx-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 5

volumes:
  agentx-data:
  agentx-logs:
  postgres-data:
  redis-data:
